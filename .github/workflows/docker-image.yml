name: Docker Image CI

on:
  push:
    branches: [ "8-154" ]
  pull_request:
    branches: [ "8-154" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        platforms: linux/amd64,linux/arm64
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
